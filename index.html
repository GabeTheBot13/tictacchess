<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TicTacToe Chess</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f0f1a;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Screens ── */
    .screen { display: none; flex-direction: column; align-items: center; width: 100%; }
    .screen.active { display: flex; }

    /* ── Menu Screen ── */
    #screen-menu {
      justify-content: center;
      min-height: 100vh;
      gap: 0;
    }
    .menu-title {
      font-size: 3rem;
      font-weight: 900;
      letter-spacing: 4px;
      color: #e2c96e;
      margin-bottom: 6px;
      text-align: center;
    }
    .menu-subtitle {
      font-size: 1rem;
      color: #888;
      margin-bottom: 48px;
      letter-spacing: 2px;
    }
    .menu-btns {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 280px;
    }
    .btn {
      padding: 14px 28px;
      border: none;
      border-radius: 6px;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 1px;
      transition: filter 0.15s, transform 0.1s;
    }
    .btn:hover { filter: brightness(1.12); transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn-gold  { background: #e2c96e; color: #1a1a2e; }
    .btn-dark  { background: #2a2a3e; color: #ccc; border: 1px solid #444; }
    .btn-red   { background: #c0392b; color: #fff; }
    .btn-sm    { padding: 8px 20px; font-size: 0.9rem; }

    /* ── Login Screen ── */
    #screen-login {
      justify-content: center;
      min-height: 100vh;
      gap: 16px;
    }
    .login-box {
      background: #1a1a2e;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 36px 40px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 320px;
    }
    .login-box h2 { color: #e2c96e; font-size: 1.4rem; text-align: center; }
    .login-box input {
      background: #0f0f1a;
      border: 1px solid #444;
      border-radius: 6px;
      padding: 10px 14px;
      color: #eee;
      font-size: 1rem;
      outline: none;
    }
    .login-box input:focus { border-color: #e2c96e; }

    /* ── Matchmaking Screen ── */
    #screen-matchmaking {
      justify-content: center;
      min-height: 100vh;
      gap: 20px;
    }
    .mm-box {
      background: #1a1a2e;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 40px 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    .mm-box h2 { color: #e2c96e; }
    .spinner {
      width: 44px; height: 44px;
      border: 4px solid #333;
      border-top-color: #e2c96e;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .mm-info { color: #888; font-size: 0.9rem; text-align: center; }

    /* ── Game Screen ── */
    #screen-game {
      padding: 16px 0 24px;
      gap: 0;
    }
    .game-header {
      width: 620px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 10px 10px;
    }
    .player-card {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .player-name { font-weight: 700; font-size: 1rem; }
    .player-elo  { font-size: 0.8rem; color: #888; }
    .player-card.active .player-name { color: #e2c96e; }
    #status-bar {
      font-size: 0.9rem;
      color: #aef;
      text-align: center;
      background: #1a1a2e;
      border-radius: 6px;
      padding: 4px 14px;
    }
    canvas {
      display: block;
      border: 3px solid #333;
      border-radius: 4px;
      cursor: pointer;
    }
    .game-footer {
      width: 620px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 10px 0;
    }
    .legend {
      display: flex;
      gap: 14px;
      font-size: 0.75rem;
      color: #666;
      flex-wrap: wrap;
    }
    .game-actions { display: flex; gap: 10px; }

    /* ── Result Screen ── */
    #screen-result {
      justify-content: center;
      min-height: 100vh;
      gap: 20px;
    }
    .result-box {
      background: #1a1a2e;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 40px 52px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      text-align: center;
    }
    .result-emoji { font-size: 3.5rem; }
    .result-title { font-size: 1.8rem; font-weight: 900; color: #e2c96e; }
    .result-reason { color: #888; font-size: 0.95rem; }
    .elo-change { font-size: 1.3rem; font-weight: 700; }
    .elo-change.up   { color: #4caf50; }
    .elo-change.down { color: #e05c5c; }
    .new-elo { color: #aaa; font-size: 0.9rem; }
  </style>
</head>
<body>

<!-- ══ MENU ══════════════════════════════════════════════════════════════════ -->
<div id="screen-menu" class="screen active">
  <div class="menu-title">TicTacToe Chess</div>
  <div class="menu-subtitle">STRATEGY · TACTICS · CENTER CONTROL</div>
  <div class="menu-btns">
    <button class="btn btn-gold" onclick="goOnline()">🌐 Play Online</button>
    <button class="btn btn-dark" onclick="startLocal()">🤝 Play In Person</button>
  </div>
</div>

<!-- ══ LOGIN ═════════════════════════════════════════════════════════════════ -->
<div id="screen-login" class="screen">
  <div class="login-box">
    <h2>Play Online</h2>
    <input id="username-input" type="text" placeholder="Enter username" maxlength="20" autocomplete="off">
    <button class="btn btn-gold" onclick="doRegister()">Continue</button>
    <button class="btn btn-dark" onclick="showScreen('menu')">← Back</button>
  </div>
  <div id="login-error" style="color:#e05c5c;font-size:0.85rem;display:none;"></div>
</div>

<!-- ══ MATCHMAKING ════════════════════════════════════════════════════════════ -->
<div id="screen-matchmaking" class="screen">
  <div class="mm-box">
    <h2>Finding Opponent…</h2>
    <div class="spinner"></div>
    <div id="mm-info" class="mm-info">Searching for a match</div>
    <button class="btn btn-dark btn-sm" onclick="cancelSearch()">Cancel</button>
  </div>
</div>

<!-- ══ GAME ═══════════════════════════════════════════════════════════════════ -->
<div id="screen-game" class="screen">
  <div class="game-header">
    <div class="player-card" id="card-x">
      <div class="player-name" id="name-x">Player X</div>
      <div class="player-elo"  id="elo-x"></div>
    </div>
    <div id="status-bar">–</div>
    <div class="player-card" id="card-o">
      <div class="player-name" id="name-o">Player O</div>
      <div class="player-elo"  id="elo-o"></div>
    </div>
  </div>

  <canvas id="game" width="600" height="1000"></canvas>

  <div class="game-footer">
    <div class="legend">
      <span>X/O = Ticker</span><span>G = Guard</span><span>E = Eliminator</span>
      <span>F = Flyer</span><span>K = King</span><span>H = Hopper</span>
    </div>
    <div class="game-actions">
      <button class="btn btn-dark btn-sm" id="btn-resign" onclick="resign()">Resign</button>
      <button class="btn btn-dark btn-sm" id="btn-restart" onclick="restartLocal()" style="display:none">Restart</button>
    </div>
  </div>
</div>

<!-- ══ RESULT ═════════════════════════════════════════════════════════════════ -->
<div id="screen-result" class="screen">
  <div class="result-box">
    <div class="result-emoji" id="result-emoji">🏆</div>
    <div class="result-title" id="result-title">You Win!</div>
    <div class="result-reason" id="result-reason"></div>
    <div class="elo-change" id="elo-change-el"></div>
    <div class="new-elo" id="new-elo-el"></div>
    <button class="btn btn-gold" style="margin-top:8px" onclick="playAgain()">Play Again</button>
    <button class="btn btn-dark" onclick="showScreen('menu')">Main Menu</button>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════════════════════
// SCREEN ROUTING
// ══════════════════════════════════════════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
}

// ══════════════════════════════════════════════════════════════════════════════
// WEBSOCKET / ONLINE STATE
// ══════════════════════════════════════════════════════════════════════════════
const WS_URL = location.hostname === 'localhost' 
  ? 'ws://localhost:8080'
  : 'ws://192.168.1.199:8080';
let ws = null;
let myUsername = '';
let myElo = 1200;
let mySide = null;       // 'X' or 'O' in online games
let onlineMode = false;

function connectWS() {
  return new Promise((resolve, reject) => {
    ws = new WebSocket(WS_URL);
    ws.onopen  = () => resolve();
    ws.onerror = () => reject(new Error('Cannot connect to server.\nMake sure server.js is running:\n  node server.js'));
    ws.onmessage = (e) => handleServerMsg(JSON.parse(e.data));
    ws.onclose = () => {
      if (onlineMode && !gameOver) {
        showLoginError('Disconnected from server.');
      }
    };
  });
}

function sendWS(obj) {
  if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(obj));
}

function handleServerMsg(msg) {
  switch (msg.type) {
    case 'registered':
      myElo = msg.elo;
      document.getElementById('mm-info').textContent =
        `${msg.username} · ELO ${msg.elo} (${msg.wins}W / ${msg.losses}L)`;
      sendWS({ type: 'find_game' });
      showScreen('matchmaking');
      break;

    case 'waiting':
      document.getElementById('mm-info').textContent = 'Waiting for opponent…';
      break;

    case 'search_cancelled':
      showScreen('login');
      break;

    case 'game_start':
      mySide = msg.yourSide;
      onlineMode = true;
      startOnlineGame(msg);
      break;

    case 'move':
      applyOpponentMove(msg.move);
      break;

    case 'game_over':
      handleOnlineGameOver(msg);
      break;

    case 'error':
      showLoginError(msg.message);
      break;
  }
}

// ══════════════════════════════════════════════════════════════════════════════
// LOGIN / MATCHMAKING UI
// ══════════════════════════════════════════════════════════════════════════════
function showLoginError(msg) {
  const el = document.getElementById('login-error');
  el.textContent = msg;
  el.style.display = 'block';
}

async function goOnline() {
  document.getElementById('login-error').style.display = 'none';
  showScreen('login');
  if (!ws || ws.readyState !== WebSocket.OPEN) {
    try {
      await connectWS();
    } catch(e) {
      showScreen('login');
      showLoginError(e.message);
    }
  }
}

function doRegister() {
  const u = document.getElementById('username-input').value.trim();
  if (!u) { showLoginError('Please enter a username.'); return; }
  if (!ws || ws.readyState !== WebSocket.OPEN) {
    showLoginError('Not connected to server. Is server.js running?');
    return;
  }
  myUsername = u;
  sendWS({ type: 'register', username: u });
}

function cancelSearch() {
  sendWS({ type: 'cancel_search' });
  showScreen('menu');
}

function playAgain() {
  if (onlineMode) {
    sendWS({ type: 'find_game' });
    showScreen('matchmaking');
  } else {
    startLocal();
  }
}

// ══════════════════════════════════════════════════════════════════════════════
// GAME CONSTANTS
// ══════════════════════════════════════════════════════════════════════════════
const canvas = document.getElementById('game');
const ctx    = canvas.getContext('2d');

const TILE = 100;
const COLS = 6;
const ROWS = 10;
const TTT_ROW = 4;
const TTT_COL = 2;

const COLORS = { X: '#4a90d9', O: '#e05c5c' };

// ══════════════════════════════════════════════════════════════════════════════
// GAME STATE
// ══════════════════════════════════════════════════════════════════════════════
let board         = [];
let tttGrid       = [];
let tttWinner     = null;
let currentPlayer = 'X';
let selectedPiece = null;
let gameOver      = false;
let isLocalGame   = true;

// ── helpers ──
function isTTT(r,c){ return r>=TTT_ROW && r<TTT_ROW+2 && c>=TTT_COL && c<TTT_COL+2; }
function inBounds(r,c){ return r>=0 && r<ROWS && c>=0 && c<COLS; }
function tileColor(r,c){ return (r+c)%2===0 ? 'light' : 'dark'; }

// ── initial pieces ──
function placeInitialPieces() {
  board[0][0]={player:'X',type:'E'}; board[0][1]={player:'X',type:'H'};
  board[0][2]={player:'X',type:'F'}; board[0][3]={player:'X',type:'K'};
  board[0][4]={player:'X',type:'F'}; board[0][5]={player:'X',type:'E'};
  for(let c=0;c<6;c++) board[1][c]={player:'X',type:'X'};
  board[6][2]={player:'X',type:'G'}; board[6][3]={player:'X',type:'G'};

  for(let c=0;c<6;c++) board[8][c]={player:'O',type:'O'};
  board[9][0]={player:'O',type:'E'}; board[9][1]={player:'O',type:'H'};
  board[9][2]={player:'O',type:'F'}; board[9][3]={player:'O',type:'K'};
  board[9][4]={player:'O',type:'F'}; board[9][5]={player:'O',type:'E'};
  board[3][2]={player:'O',type:'G'}; board[3][3]={player:'O',type:'G'};
}

function resetGameState() {
  board = Array.from({length:ROWS}, ()=>Array(COLS).fill(null));
  tttGrid = Array(9).fill(null);
  tttWinner = null;
  currentPlayer = 'X';
  selectedPiece = null;
  gameOver = false;
  placeInitialPieces();
}

// ══════════════════════════════════════════════════════════════════════════════
// START MODES
// ══════════════════════════════════════════════════════════════════════════════
function startLocal() {
  isLocalGame = true;
  onlineMode  = false;
  mySide      = null;
  resetGameState();
  document.getElementById('name-x').textContent = 'Player X';
  document.getElementById('name-o').textContent = 'Player O';
  document.getElementById('elo-x').textContent = '';
  document.getElementById('elo-o').textContent = '';
  document.getElementById('btn-resign').style.display = 'none';
  document.getElementById('btn-restart').style.display = '';
  setStatus("Player X's turn");
  showScreen('game');
  drawBoard();
}

function startOnlineGame(msg) {
  isLocalGame = false;
  resetGameState();

  const meIsX = mySide === 'X';
  document.getElementById('name-x').textContent = meIsX ? myUsername : msg.opponentName;
  document.getElementById('name-o').textContent = meIsX ? msg.opponentName : myUsername;
  document.getElementById('elo-x').textContent  = meIsX ? `ELO ${myElo}` : `ELO ${msg.opponentElo}`;
  document.getElementById('elo-o').textContent  = meIsX ? `ELO ${msg.opponentElo}` : `ELO ${myElo}`;
  document.getElementById('btn-resign').style.display = '';
  document.getElementById('btn-restart').style.display = 'none';

  setStatus(currentPlayer === mySide ? 'Your turn' : "Opponent's turn");
  showScreen('game');
  drawBoard();
}

function restartLocal() {
  if (isLocalGame) startLocal();
}

function resign() {
  if (onlineMode) {
    sendWS({ type: 'resign' });
  } else {
    showScreen('menu');
  }
}

// ══════════════════════════════════════════════════════════════════════════════
// DRAWING
// ══════════════════════════════════════════════════════════════════════════════
function setStatus(txt) {
  document.getElementById('status-bar').textContent = txt;
  const xActive = currentPlayer === 'X';
  document.getElementById('card-x').classList.toggle('active', xActive);
  document.getElementById('card-o').classList.toggle('active', !xActive);
}

function drawBoard() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for (let r=0; r<ROWS; r++) {
    for (let c=0; c<COLS; c++) {
      const x = c*TILE, y = r*TILE;

      // Base tile
      if (isTTT(r,c)) {
        ctx.fillStyle = '#2a200a';
      } else {
        ctx.fillStyle = (r+c)%2===0 ? '#2c2c3e' : '#1e1e2e';
      }
      ctx.fillRect(x, y, TILE, TILE);

      // Selected highlight
      if (selectedPiece && selectedPiece.row===r && selectedPiece.col===c) {
        ctx.fillStyle = 'rgba(226,201,110,0.35)';
        ctx.fillRect(x, y, TILE, TILE);
      }

      // Valid move highlight
      const canMove = selectedPiece && isMyTurn() &&
        isValidMove(selectedPiece.piece, selectedPiece.row, selectedPiece.col, r, c);
      if (canMove) {
        ctx.fillStyle = isTTT(r,c) ? 'rgba(226,201,110,0.18)' : 'rgba(100,220,100,0.22)';
        ctx.fillRect(x, y, TILE, TILE);
      }

      ctx.strokeStyle = '#333';
      ctx.lineWidth = 1;
      ctx.strokeRect(x, y, TILE, TILE);

      if (board[r][c]) drawPiece(board[r][c], x, y);
    }
  }

  drawTTTGrid();
  drawTTTMarks();

  if (gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }
}

function drawPiece(piece, x, y) {
  ctx.fillStyle = COLORS[piece.player];
  ctx.font = 'bold 34px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(piece.type, x+TILE/2, y+TILE/2);
}

function drawTTTGrid() {
  const sx=TTT_COL*TILE, sy=TTT_ROW*TILE, w=TILE*2, h=TILE*2;
  ctx.strokeStyle='#e2c96e'; ctx.lineWidth=3;
  ctx.strokeRect(sx, sy, w, h);
  const cw=w/3, ch=h/3;
  ctx.strokeStyle='#7a6420'; ctx.lineWidth=1.5;
  for (let i=1;i<=2;i++) {
    ctx.beginPath(); ctx.moveTo(sx+cw*i,sy); ctx.lineTo(sx+cw*i,sy+h); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(sx,sy+ch*i); ctx.lineTo(sx+w,sy+ch*i); ctx.stroke();
  }
}

function drawTTTMarks() {
  const sx=TTT_COL*TILE, sy=TTT_ROW*TILE;
  const cw=(TILE*2)/3, ch=(TILE*2)/3;
  for (let i=0;i<9;i++) {
    if (!tttGrid[i]) continue;
    const col=i%3, row=Math.floor(i/3);
    const cx=sx+cw*col+cw/2, cy=sy+ch*row+ch/2;
    ctx.fillStyle = COLORS[tttGrid[i]];
    ctx.font='bold 36px monospace';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(tttGrid[i], cx, cy);
  }
}

// ══════════════════════════════════════════════════════════════════════════════
// MOVE VALIDATION
// ══════════════════════════════════════════════════════════════════════════════
function isMyTurn() {
  if (isLocalGame) return true;
  return currentPlayer === mySide;
}

function isValidMove(piece, fr, fc, tr, tc) {
  if (!inBounds(tr,tc)) return false;
  if (fr===tr && fc===tc) return false;
  const target = board[tr][tc];
  const dr = tr-fr, dc = tc-fc;

  if (target && target.player === piece.player) return false;
  if (target && target.type === 'F') return false;

  const isTicker = piece.type === piece.player;
  if (isTTT(tr,tc) && !isTicker) return false;

  switch(piece.type) {
    case 'X': case 'O': {
      if (isTTT(tr,tc)) {
        const adjToTTT = (
          fr===TTT_ROW-1 || fr===TTT_ROW+2 ||
          fc===TTT_COL-1 || fc===TTT_COL+2 ||
          isTTT(fr,fc)
        ) && (
          fr>=TTT_ROW-1 && fr<=TTT_ROW+2 &&
          fc>=TTT_COL-1 && fc<=TTT_COL+2
        );
        return adjToTTT;
      }
      if (Math.abs(dr)>1 || Math.abs(dc)>1) return false;
      if (target) return false;
      return true;
    }
    case 'G': {
      if (!hasEnemyAdjacent(fr,fc,piece.player)) return false;
      if (Math.abs(dr)>1 || Math.abs(dc)>1) return false;
      if (!target || target.player===piece.player) return false;
      return true;
    }
    case 'E': {
      if (Math.abs(dr)>3 || Math.abs(dc)>3) return false;
      if (dr!==0 && dc!==0 && Math.abs(dr)!==Math.abs(dc)) return false;
      return pathClear(fr,fc,tr,tc);
    }
    case 'F': {
      if (target) return false;
      return true;
    }
    case 'K': {
      return Math.abs(dr)<=1 && Math.abs(dc)<=1;
    }
    case 'H': {
      if (dr!==0 && dc!==0) return false;
      const stepR=dr===0?0:Math.sign(dr), stepC=dc===0?0:Math.sign(dc);
      const startColor=tileColor(fr,fc);
      let diffCount=0, r=fr+stepR, c=fc+stepC;
      while(inBounds(r,c)){
        if(tileColor(r,c)!==startColor){ diffCount++; if(diffCount===2) return r===tr&&c===tc; }
        r+=stepR; c+=stepC;
      }
      return false;
    }
  }
  return false;
}

function hasEnemyAdjacent(row,col,player){
  for(let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++){
    if(dr===0&&dc===0) continue;
    const nr=row+dr,nc=col+dc;
    if(inBounds(nr,nc)&&board[nr][nc]&&board[nr][nc].player!==player) return true;
  }
  return false;
}

function pathClear(fr,fc,tr,tc){
  const stepR=tr===fr?0:Math.sign(tr-fr), stepC=tc===fc?0:Math.sign(tc-fc);
  let r=fr+stepR,c=fc+stepC;
  while(r!==tr||c!==tc){ if(board[r][c]) return false; r+=stepR; c+=stepC; }
  return true;
}

// ══════════════════════════════════════════════════════════════════════════════
// TTT LOGIC
// ══════════════════════════════════════════════════════════════════════════════
function checkTTTWinner(){
  const wins=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
  for(const[a,b,c]of wins) if(tttGrid[a]&&tttGrid[a]===tttGrid[b]&&tttGrid[a]===tttGrid[c]) return tttGrid[a];
  return null;
}

function getTTTIdx(pixX, pixY){
  const tttPixX=pixX-TTT_COL*TILE, tttPixY=pixY-TTT_ROW*TILE;
  const cw=(TILE*2)/3, ch=(TILE*2)/3;
  const gc=Math.min(2,Math.max(0,Math.floor(tttPixX/cw)));
  const gr=Math.min(2,Math.max(0,Math.floor(tttPixY/ch)));
  return gr*3+gc;
}

// ══════════════════════════════════════════════════════════════════════════════
// WIN CONDITIONS
// ══════════════════════════════════════════════════════════════════════════════
function checkWin(playerWhoMoved, toRow, toCol) {
  if (tttWinner) {
    localWin(tttWinner, `${tttWinner} got three in a row!`);
    return true;
  }
  const piece = board[toRow]?.[toCol];
  if (piece && piece.type==='K') {
    if (playerWhoMoved==='X' && toRow===ROWS-1){ localWin('X','X\'s King crossed the board!'); return true; }
    if (playerWhoMoved==='O' && toRow===0)     { localWin('O','O\'s King crossed the board!'); return true; }
  }
  return false;
}

function localWin(winner, reason) {
  gameOver = true;
  if (onlineMode) {
    sendWS({ type: 'game_over_report', winner, reason });
  } else {
    drawBoard();
    showResult(winner === (isLocalGame ? currentPlayer : mySide) ? 'win' : 'loss', reason, null, null);
  }
}

function handleOnlineGameOver(msg) {
  gameOver = true;
  drawBoard();
  showResult(msg.result, msg.reason, msg.eloChange, msg.newElo);
}

function showResult(result, reason, eloChange, newElo) {
  const isWin = result === 'win';
  document.getElementById('result-emoji').textContent = isWin ? '🏆' : '💀';
  document.getElementById('result-title').textContent = isWin ? 'You Win!' : 'You Lose';
  document.getElementById('result-reason').textContent = reason || '';

  if (eloChange !== null && eloChange !== undefined) {
    const el = document.getElementById('elo-change-el');
    el.textContent = (eloChange >= 0 ? '+' : '') + eloChange + ' ELO';
    el.className = 'elo-change ' + (eloChange >= 0 ? 'up' : 'down');
    document.getElementById('new-elo-el').textContent = `New ELO: ${newElo}`;
  } else {
    document.getElementById('elo-change-el').textContent = '';
    document.getElementById('new-elo-el').textContent = '';
  }

  showScreen('result');
}

// ══════════════════════════════════════════════════════════════════════════════
// EXECUTE MOVE (shared logic for local + applying opponent moves online)
// ══════════════════════════════════════════════════════════════════════════════
function executeMove(move, isMine) {
  const { fr, fc, tr, tc, tttIdx } = move;
  const sp = board[fr][fc];
  if (!sp) return;

  const capturedPiece = board[tr]?.[tc];

  if (tttIdx !== undefined && tttIdx !== null) {
    // Ticker entering TTT
    board[fr][fc] = null;
    if (tttGrid[tttIdx] === null) {
      tttGrid[tttIdx] = sp.player;
      tttWinner = checkTTTWinner();
    }
  } else {
    board[tr][tc] = sp;
    board[fr][fc] = null;
  }

  const prev = currentPlayer;
  currentPlayer = currentPlayer === 'X' ? 'O' : 'X';

  // King captured?
  if (capturedPiece && capturedPiece.type === 'K') {
    gameOver = true;
    const winner = prev;
    const reason = `${winner} captured the King!`;
    drawBoard();
    if (onlineMode) {
      if (isMine) sendWS({ type: 'game_over_report', winner, reason });
      // Result will come back from server via game_over msg
    } else {
      showResult(winner === currentPlayer ? 'loss' : 'win', reason, null, null);
    }
    return;
  }

  if (checkWin(prev, tr, tc)) {
    if (onlineMode && isMine) {
      // already sent via localWin
    }
    drawBoard();
    return;
  }

  if (onlineMode) {
    setStatus(currentPlayer === mySide ? 'Your turn' : "Opponent's turn");
  } else {
    setStatus(`Player ${currentPlayer}'s turn`);
  }
  drawBoard();
}

// Apply a move received from opponent
function applyOpponentMove(move) {
  executeMove(move, false);
}

// ══════════════════════════════════════════════════════════════════════════════
// CLICK HANDLER
// ══════════════════════════════════════════════════════════════════════════════
canvas.addEventListener('click', (e) => {
  if (gameOver) return;
  if (!isMyTurn()) return;

  const rect   = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const pixX   = (e.clientX - rect.left) * scaleX;
  const pixY   = (e.clientY - rect.top)  * scaleY;
  const col = Math.floor(pixX / TILE);
  const row = Math.floor(pixY / TILE);

  if (!inBounds(row, col)) return;

  const clicked = board[row][col];

  if (selectedPiece) {
    const sp = selectedPiece;

    // Re-select own piece
    if (clicked && clicked.player === currentPlayer) {
      selectedPiece = { piece: clicked, row, col };
      drawBoard();
      return;
    }

    if (isValidMove(sp.piece, sp.row, sp.col, row, col)) {
      // Ticker entering TTT — need to resolve sub-cell
      if (sp.piece.type === sp.piece.player && isTTT(row, col)) {
        const idx = getTTTIdx(pixX, pixY);
        if (tttGrid[idx] !== null) {
          // Cell taken — cancel
          selectedPiece = null;
          drawBoard();
          return;
        }
        const move = { fr: sp.row, fc: sp.col, tr: row, tc: col, tttIdx: idx };
        selectedPiece = null;
        if (onlineMode) sendWS({ type: 'move', move });
        executeMove(move, true);
      } else {
        const move = { fr: sp.row, fc: sp.col, tr: row, tc: col };
        selectedPiece = null;
        if (onlineMode) sendWS({ type: 'move', move });
        executeMove(move, true);
      }
    } else {
      selectedPiece = null;
      drawBoard();
    }
    return;
  }

  // Select a piece
  if (clicked && clicked.player === currentPlayer) {
    selectedPiece = { piece: clicked, row, col };
    drawBoard();
  }
});

// ══════════════════════════════════════════════════════════════════════════════
// BOOT
// ══════════════════════════════════════════════════════════════════════════════
// Start on menu
showScreen('menu');
</script>
